# auto_power_off.cfg - Mainsail panel for automatic power off
# Save this file in ~/printer_data/config/mainsail/auto_power_off.cfg

# Physical GPIO push-buttons (optional).
# Uncomment only if you actually wire buttons to the MCU GPIOs listed in
# auto_power_off_panel.cfg AND you update those pin names for your board.
# Mainsail's web UI does NOT need this file.
# [include auto_power_off_panel.cfg]

[gcode_macro POWEROFF_STATUS]
description: Display auto power off status
gcode:
    AUTO_POWEROFF OPTION=STATUS

[gcode_macro POWEROFF_ON]
description: Enable auto power off
gcode:
    AUTO_POWEROFF OPTION=ON

[gcode_macro POWEROFF_OFF]
description: Disable auto power off
gcode:
    AUTO_POWEROFF OPTION=OFF

[gcode_macro POWEROFF_START]
description: Start power off timer
gcode:
    AUTO_POWEROFF OPTION=START

[gcode_macro POWEROFF_CANCEL]
description: Cancel power off timer
gcode:
    AUTO_POWEROFF OPTION=CANCEL

[gcode_macro POWEROFF_NOW]
description: Power off printer immediately
gcode:
    AUTO_POWEROFF OPTION=NOW

[gcode_macro POWEROFF_DIAGNOSTIC_ON]
description: Enable auto power off diagnostic logging
gcode:
    AUTO_POWEROFF OPTION=DIAGNOSTIC VALUE=1

[gcode_macro POWEROFF_DIAGNOSTIC_OFF]
description: Disable auto power off diagnostic logging
gcode:
    AUTO_POWEROFF OPTION=DIAGNOSTIC VALUE=0

[gcode_macro POWEROFF_DRYRUN_ON]
description: Enable auto power off dry-run (simulate, no real power off)
gcode:
    AUTO_POWEROFF OPTION=DRYRUN VALUE=1

[gcode_macro POWEROFF_DRYRUN_OFF]
description: Disable auto power off dry-run
gcode:
    AUTO_POWEROFF OPTION=DRYRUN VALUE=0

[gcode_macro POWEROFF_RESET]
description: Reset auto power off module state
gcode:
    AUTO_POWEROFF OPTION=RESET
