# auto_power_off_panel_fr.cfg - Boutons GPIO physiques OPTIONNELS pour Mainsail
#
# Ce fichier n'est utile QUE si vous câblez des boutons poussoirs physiques
# aux GPIO du MCU listés ci-dessous. Il n'est PAS nécessaire au
# fonctionnement du panneau Mainsail : le web appelle directement la
# commande AUTO_POWEROFF.
#
# Il n'est donc PAS inclus par défaut depuis auto_power_off_fr.cfg.
# Pour l'activer, décommentez la ligne [include] dans auto_power_off_fr.cfg
# ET ajustez les noms de broches ci-dessous à votre carte.

[virtual_sdcard]
path: ~/printer_data/gcodes

[display_status]

[pause_resume]

[respond]

# Bouton GPIO pour activer/désactiver l'extinction automatique
[gcode_button auto_poweroff_toggle]
pin: ^!gpio22
press_gcode:
    {% if printer['auto_power_off'].enabled|lower == 'true' %}
        AUTO_POWEROFF OPTION=OFF
    {% else %}
        AUTO_POWEROFF OPTION=ON
    {% endif %}

# Bouton GPIO pour démarrer le minuteur d'extinction
[gcode_button auto_poweroff_start]
pin: ^!gpio23
press_gcode:
    AUTO_POWEROFF OPTION=START

# Bouton GPIO pour annuler le minuteur d'extinction
[gcode_button auto_poweroff_cancel]
pin: ^!gpio24
press_gcode:
    AUTO_POWEROFF OPTION=CANCEL
