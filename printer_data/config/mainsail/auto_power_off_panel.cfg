# auto_power_off_panel.cfg - OPTIONAL physical GPIO buttons for Mainsail
#
# This file is ONLY useful if you wire physical push-buttons to the MCU
# GPIOs listed below. It is NOT required for the Mainsail UI to work —
# the web panel calls the AUTO_POWEROFF gcode directly.
#
# It is therefore NOT included by default from auto_power_off.cfg.
# To enable it, uncomment the [include] line in auto_power_off.cfg AND
# adjust the pin names below to match your board.

[virtual_sdcard]
path: ~/printer_data/gcodes

[display_status]

[pause_resume]

[respond]

# GPIO button to toggle auto power off enable/disable
[gcode_button auto_poweroff_toggle]
pin: ^!gpio22
press_gcode:
    {% if printer['auto_power_off'].enabled|lower == 'true' %}
        AUTO_POWEROFF OPTION=OFF
    {% else %}
        AUTO_POWEROFF OPTION=ON
    {% endif %}

# GPIO button to start power off timer
[gcode_button auto_poweroff_start]
pin: ^!gpio23
press_gcode:
    AUTO_POWEROFF OPTION=START

# GPIO button to cancel power off timer
[gcode_button auto_poweroff_cancel]
pin: ^!gpio24
press_gcode:
    AUTO_POWEROFF OPTION=CANCEL
