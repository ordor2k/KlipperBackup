# auto_power_off_fr.cfg - Panneau Mainsail pour l'extinction automatique
# Sauvegardez ce fichier dans ~/printer_data/config/mainsail/auto_power_off_fr.cfg

# Boutons poussoirs GPIO physiques (optionnel).
# À décommenter uniquement si vous câblez des boutons aux GPIO listés
# dans auto_power_off_panel_fr.cfg ET si vous ajustez les broches à
# votre carte. Le panneau web Mainsail n'en a PAS besoin.
# [include auto_power_off_panel_fr.cfg]

[gcode_macro POWEROFF_STATUS]
description: Affiche l'état du module d'extinction automatique
gcode:
    AUTO_POWEROFF OPTION=STATUS

[gcode_macro POWEROFF_ON]
description: Active l'extinction automatique
gcode:
    AUTO_POWEROFF OPTION=ON

[gcode_macro POWEROFF_OFF]
description: Désactive l'extinction automatique
gcode:
    AUTO_POWEROFF OPTION=OFF

[gcode_macro POWEROFF_START]
description: Démarre le minuteur d'extinction
gcode:
    AUTO_POWEROFF OPTION=START

[gcode_macro POWEROFF_CANCEL]
description: Annule le minuteur d'extinction
gcode:
    AUTO_POWEROFF OPTION=CANCEL

[gcode_macro POWEROFF_NOW]
description: Éteint immédiatement l'imprimante
gcode:
    AUTO_POWEROFF OPTION=NOW

[gcode_macro POWEROFF_DIAGNOSTIC_ON]
description: Active les logs de diagnostic
gcode:
    AUTO_POWEROFF OPTION=DIAGNOSTIC VALUE=1

[gcode_macro POWEROFF_DIAGNOSTIC_OFF]
description: Désactive les logs de diagnostic
gcode:
    AUTO_POWEROFF OPTION=DIAGNOSTIC VALUE=0

[gcode_macro POWEROFF_DRYRUN_ON]
description: Active le mode simulation (pas d'extinction réelle)
gcode:
    AUTO_POWEROFF OPTION=DRYRUN VALUE=1

[gcode_macro POWEROFF_DRYRUN_OFF]
description: Désactive le mode simulation
gcode:
    AUTO_POWEROFF OPTION=DRYRUN VALUE=0

[gcode_macro POWEROFF_RESET]
description: Réinitialise l'état du module
gcode:
    AUTO_POWEROFF OPTION=RESET
