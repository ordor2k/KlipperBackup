# Sonar update_manager entry
[update_manager sonar]
type: git_repo
path: ~/sonar
origin: https://github.com/mainsail-crew/sonar.git
primary_branch: main
managed_services: sonar
system_dependencies: resources/system-dependencies.json

[power printer]
type: tasmota
address: 192.168.1.243          # your Tasmota plug's IP (use your DHCP reservation!)
password:                       # only if you set a Tasmota web password
output_id: 1                    # relay number; 1 for a single-relay plug
# --- behavior options (all optional) ---
off_when_shutdown: True
locked_while_printing: True     # prevents accidentally cutting power mid-print
on_when_job_queued: True        # auto power-on when you upload+print from the slicer
restart_klipper_when_powered: True
restart_delay: 1                # seconds to wait after power-on before restarting Klipper
bound_services: klipper

[update_manager klipper-backup]
type: git_repo
path: ~/klipper-backup
origin: https://github.com/Staubgeborener/klipper-backup.git
managed_services: moonraker
primary_branch: main

[update_manager BDsensor]
type: git_repo
primary_branch: new
channel: dev
path: ~/Bed_Distance_sensor
origin: https://github.com/markniu/Bed_Distance_sensor.git
install_script: ./klipper/install_BDsensor.sh
is_system_service: False
managed_services: klipper
info_tags:
  desc=Bed Distance Sensor