# Ender 3 V2 + BigTreeTech SKR Mini E3 V3.0
# Based on the official Klipper reference config for this board, adapted for:
#   - BMG direct drive extruder + NF Crazy (Mosquito clone) hotend
#   - PT1000 hotend thermistor
#   - 0.4mm nozzle
#   - BLTouch / CR-Touch (replaces physical Z endstop)
#   - Filament runout sensor
#
# Firmware: STM32G0B1, "8KiB bootloader", USB communication.
# Flash via SD card method (make flash does not work on this board):
#   copy out/klipper.bin to SD card as firmware.bin, insert, power cycle.
#
# THINGS YOU STILL NEED TO CALIBRATE - do not trust these blindly:
#   1. [extruder] rotation_distance - placeholder assumes 3:1 BMG gearbox.
#      Calibrate: extrude 100mm commanded, measure actual, then
#      new_value = old_value * (100 / measured_mm)
#   2. [extruder] pid_Kp/Ki/Kd - these are generic defaults, NOT tuned for
#      your PT1000 + NF Crazy combo. Run PID_CALIBRATE HEATER=extruder
#      TARGET=240, then SAVE_CONFIG.
#   3. [heater_bed] pid values - same story, run PID_CALIBRATE HEATER=heater_bed
#      TARGET=100, then SAVE_CONFIG.
#   4. [bltouch] x_offset/y_offset - measure nozzle-to-probe distance physically.
#   5. [bltouch] z_offset - use PROBE_CALIBATE, never guess this one.
#   6. [mcu] serial - replace placeholder with your actual path from
#      ls /dev/serial/by-id/*

[mcu]
serial: /dev/serial/by-id/usb-Klipper_Klipper_firmware_12345-if00

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 3000
max_z_velocity: 5
max_z_accel: 100
square_corner_velocity: 5
# Note: 300/3000 are aggressive template defaults. On a stock Ender 3 V2
# frame you'll likely see ringing/ghosting well before hitting these.
# Consider starting around max_velocity: 150, max_accel: 1500 and tuning
# up from there once everything else is verified working.

#####################################################################
#   X/Y/Z Stepper Motors
#####################################################################

[stepper_x]
step_pin: PB13
dir_pin: !PB12
enable_pin: !PB14
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC0
position_endstop: 0
position_max: 235
homing_speed: 50

[tmc2209 stepper_x]
uart_pin: PC11
tx_pin: PC10
uart_address: 0
run_current: 0.580
stealthchop_threshold: 999999

[stepper_y]
step_pin: PB10
dir_pin: !PB2
enable_pin: !PB11
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC1
position_endstop: 0
position_max: 235
homing_speed: 50

[tmc2209 stepper_y]
uart_pin: PC11
tx_pin: PC10
uart_address: 2
run_current: 0.580
stealthchop_threshold: 999999

[stepper_z]
step_pin: PB0
dir_pin: PC5
enable_pin: !PB1
microsteps: 16
rotation_distance: 8
# Physical Z endstop replaced with BLTouch virtual endstop:
endstop_pin: probe:z_virtual_endstop
position_min: -5
position_max: 250

[tmc2209 stepper_z]
uart_pin: PC11
tx_pin: PC10
uart_address: 1
run_current: 0.580
stealthchop_threshold: 999999

#####################################################################
#   Extruder
#####################################################################

[extruder]
step_pin: PB3
dir_pin: !PB4
enable_pin: !PD1
microsteps: 16
# --- CALIBRATE THIS for your BMG gear ratio ---
rotation_distance: 7.710
gear_ratio: 3:1
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PC8
sensor_type: PT1000
sensor_pin: PA0
# Stock TH0 pullup on this board is 4.7k, sized for NTC thermistors.
# PT1000 will still work but reads slightly less accurately with this
# pullup. Only uncomment below if you've physically swapped the TH0
# pullup resistor to 1k:
#pullup_resistor: 1000
control: pid
# Generic placeholder values - RECALIBRATE for PT1000 + NF Crazy:
pid_Kp: 21.527
pid_Ki: 1.063
pid_Kd: 108.982
min_temp: 0
max_temp: 300
min_extrude_temp: 170

[tmc2209 extruder]
uart_pin: PC11
tx_pin: PC10
uart_address: 3
run_current: 0.650

#####################################################################
#   Heated Bed
#####################################################################

[heater_bed]
heater_pin: PC9
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
control: pid
pid_Kp: 54.027
pid_Ki: 0.770
pid_Kd: 948.182
min_temp: 0
max_temp: 130

#####################################################################
#   BLTouch / CR-Touch
#####################################################################

[bltouch]
sensor_pin: ^PC14
control_pin: PA1
# --- MEASURE AND SET THESE ---
x_offset: -44
y_offset: -8
# Placeholder so Klipper will start - this is NOT your real offset.
# Run PROBE_CALIBRATE after startup to find the correct value, then
# update this line and SAVE_CONFIG.
z_offset: 2.0
speed: 5
samples: 2
sample_retract_dist: 3.0

[safe_z_home]
home_xy_position: 117, 117
speed: 50
z_hop: 10

[bed_mesh]
speed: 120
horizontal_move_z: 5
mesh_min: 15, 25
mesh_max: 200, 220
probe_count: 5, 5
algorithm: bicubic

#####################################################################
#   Fans
#####################################################################

[fan]
# Part cooling fan
pin: PC6

[heater_fan heatbreak_cooling_fan]
pin: PC7

[heater_fan controller_fan]
pin: PB15

#####################################################################
#   Filament Runout Sensor
#####################################################################

[filament_switch_sensor filament_sensor]
switch_pin: !PA4
pause_on_runout: True
runout_gcode:
  M117 Filament Runout Detected

#####################################################################
#   Display header (uncomment + configure if using stock display)
#####################################################################

[board_pins]
aliases:
    # EXP1 header
    EXP1_1=PB5,  EXP1_3=PA9,   EXP1_5=PA10, EXP1_7=PB8, EXP1_9=<GND>,
    EXP1_2=PA15, EXP1_4=<RST>, EXP1_6=PB9,  EXP1_8=PD6, EXP1_10=<5V>
# See the sample-lcd.cfg file in the Klipper repo for display definitions.

#####################################################################
#   Misc
#####################################################################

[idle_timeout]
timeout: 1800

[pause_resume]

[respond]

[display_status]

[virtual_sdcard]
path: ~/printer_data/gcodes