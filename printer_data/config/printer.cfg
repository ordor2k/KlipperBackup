# Klipper config for:
#   Ender 3 V2 + BigTreeTech SKR Mini E3 V3 (single board, no CAN toolboard yet)
#   BMG direct drive extruder + NF Crazy (Mosquito clone) hotend, 0.4mm nozzle
#   PT1000 hotend thermistor
#   BLTouch / CR-Touch for Z homing and bed mesh
#   Stock X/Y physical microswitch endstops
#
# IMPORTANT - things YOU must check/calibrate before relying on this:
#   1. [extruder] rotation_distance - placeholder value below assumes a 3:1 BMG.
#      If your BMG is a different ratio, recalculate (see comment at that section).
#   2. [extruder] sensor_type is set to PT1000 - confirm your wiring matches
#      (PT1000 is not polarity sensitive but double check it's seated in TH0).
#   3. [bltouch] x_offset / y_offset - placeholder values, measure your actual
#      probe-to-nozzle offset and update.
#   4. PID values are NOT included - run PID_CALIBRATE after first successful
#      heating test, then save_config to persist the results.
#   5. max_velocity/max_accel are conservative stock-frame defaults. Tune up
#      gradually once everything is verified working.

[mcu]
# Find your actual path: ls /dev/serial/by-id/*
serial: /dev/serial/by-id/usb-Klipper_stm32g0b1xx_520036001650505539323620-if00

[printer]
kinematics: cartesian
max_velocity: 150
max_accel: 1500
max_z_velocity: 15
max_z_accel: 350
square_corner_velocity: 5

#####################################################################
#   X/Y/Z Stepper Motors
#####################################################################

[stepper_x]
step_pin: PB13
dir_pin: PB12
enable_pin: !PB14
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC0
position_endstop: 0
position_min: 0
position_max: 235
homing_speed: 50

[tmc2209 stepper_x]
uart_pin: PC10
run_current: 0.580
stealthchop_threshold: 999999

[stepper_y]
step_pin: PB10
dir_pin: PB2
enable_pin: !PB11
microsteps: 16
rotation_distance: 40
endstop_pin: ^PC1
position_endstop: 0
position_min: 0
position_max: 235
homing_speed: 50

[tmc2209 stepper_y]
uart_pin: PC11
run_current: 0.580
stealthchop_threshold: 999999

[stepper_z]
step_pin: PB0
dir_pin: PC5
enable_pin: !PB1
microsteps: 16
rotation_distance: 8
endstop_pin: probe:z_virtual_endstop
position_min: -5
position_max: 250

[tmc2209 stepper_z]
uart_pin: PC12
run_current: 0.580
stealthchop_threshold: 999999

#####################################################################
#   Extruder (BMG direct drive + NF Crazy hotend)
#####################################################################

[extruder]
step_pin: PB3
dir_pin: PB4
enable_pin: !PD1
microsteps: 16
# --- CALIBRATE THIS ---
# Placeholder assumes a 3:1 BMG gearbox. Formula:
#   rotation_distance = (motor full steps per rev / microsteps... already
#   accounted for by 'microsteps' above) -> in practice just do Klipper's
#   standard rotation_distance calibration: mark filament, extrude 100mm
#   commanded, measure actual distance moved, then:
#   new_rotation_distance = old_rotation_distance * (100 / measured_mm)
rotation_distance: 7.710
gear_ratio: 3:1
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PC8
sensor_type: PT1000
sensor_pin: PA0
# Stock TH0 pullup on the SKR Mini E3 V3 is 4.7k, sized for NTC thermistors.
# PT1000 will still work but reads slightly less accurately with this pullup.
# Uncomment below ONLY if you've physically swapped the board's TH0 pullup
# resistor to 1k - otherwise leave commented (wrong value here will give
# badly wrong temps, worse than not setting it at all):
#pullup_resistor: 1000
min_temp: 0
max_temp: 300
max_power: 1.0
min_extrude_temp: 170
control: pid
# Run PID_CALIBRATE HEATER=extruder TARGET=240 then save_config
#pid_Kp: 
#pid_Ki: 
#pid_Kd: 

[tmc2209 extruder]
uart_pin: PD2
run_current: 0.650
stealthchop_threshold: 999999

#####################################################################
#   Heated Bed
#####################################################################

[heater_bed]
heater_pin: PC9
sensor_type: Generic 3950
sensor_pin: PC4
min_temp: 0
max_temp: 130
max_power: 1.0
control: pid
# Run PID_CALIBRATE HEATER=heater_bed TARGET=100 then save_config
#pid_Kp: 
#pid_Ki: 
#pid_Kd: 

#####################################################################
#   BLTouch / CR-Touch
#####################################################################

[bltouch]
sensor_pin: ^PC14
control_pin: PA1
# --- MEASURE AND SET THESE ---
# Offset of probe relative to nozzle. Common convention:
# x_offset: probe is to the LEFT of nozzle = negative value
# y_offset: probe is BEHIND nozzle = positive value (varies by mount)
x_offset: -44
y_offset: -8
#z_offset: set via PROBE_CALIBRATE, do not guess this one
speed: 5
samples: 2
sample_retract_dist: 3.0

[safe_z_home]
# Centered on a 235x235 bed; adjust if your bed_mesh area differs
home_xy_position: 117, 117
speed: 50
z_hop: 10

[bed_mesh]
speed: 120
horizontal_move_z: 5
# mesh bounds account for BLTouch offset reach - adjust to your probe's
# physical limits (it can't probe right at the very edges)
mesh_min: 15, 25
mesh_max: 200, 220
probe_count: 5, 5
algorithm: bicubic

#####################################################################
#   Fans
#####################################################################

[fan]
# Part cooling fan
pin: PC6

[heater_fan hotend_fan]
# Hotend heatsink fan - runs automatically based on extruder temp
pin: PC7
heater: extruder
heater_temp: 50.0

#####################################################################
#   Filament Runout Sensor
#####################################################################

[filament_switch_sensor filament_sensor]
switch_pin: !PA4
pause_on_runout: True
runout_gcode:
  M117 Filament Runout Detected

#####################################################################
#   Display (uncomment if you have the stock Ender 3 V2 display
#   wired to the SKR Mini E3 V3's EXP1/EXP2 headers)
#####################################################################

#[display]
#lcd_type: st7920
#cs_pin: PB8
#sclk_pin: PB9
#sid_pin: PD6
#encoder_pins: ^PA10, ^PA9
#click_pin: ^!PA8

#####################################################################
#   Misc
#####################################################################

[idle_timeout]
timeout: 1800

[pause_resume]

[respond]

[display_status]

[virtual_sdcard]
path: ~/printer_data/gcodes