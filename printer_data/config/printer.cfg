[mcu]
serial: /dev/serial/by-id/usb-1a86_USB_Serial-if00-port0
restart_method: command
# Run: ls /dev/serial/by-id/ to find your exact ID after connecting USB

[include mainsail.cfg]

[printer]
kinematics: cartesian
max_velocity: 300
max_accel: 3000
max_z_velocity: 5
max_z_accel: 100

#####################################################################
# Stepper Motors
#####################################################################

[stepper_x]
step_pin: PC2
dir_pin: PB9
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ^PA5
position_endstop: 0
position_max: 235
homing_speed: 50

[stepper_y]
step_pin: PB8
dir_pin: PB7
enable_pin: !PC3
microsteps: 16
rotation_distance: 40
endstop_pin: ^PA6
position_endstop: 0
position_max: 235
homing_speed: 50

[stepper_z]
step_pin: PB6
dir_pin: !PB5
enable_pin: !PC3
microsteps: 16
rotation_distance: 8
# BLTouch replaces Z endstop:
endstop_pin: probe:z_virtual_endstop
position_min: -10
position_max: 250

[extruder]
step_pin: PB4
dir_pin: PB3
enable_pin: !PC3
microsteps: 16
# BMG dual-drive gear ratio:
gear_ratio: 3:1
rotation_distance: 23.132  # Calibrate this! (roughly 7.711 * gear_ratio)
nozzle_diameter: 0.400
filament_diameter: 1.750
heater_pin: PA1
sensor_type: ATC Semitec 104NT-4-R025H42G  # Mosquito uses this thermistor
sensor_pin: PC5
#control: pid
# Tune these with PID_CALIBRATE:
#pid_kp: 21.527
#pid_ki: 1.063
#pid_kd: 108.982
min_temp: 0
max_temp: 300
max_extrude_only_distance: 150
pressure_advance: 0.04  # Tune later with PA tower

#####################################################################
# BLTouch
#####################################################################

[bltouch]
sensor_pin: ^PB1
control_pin: PB0
x_offset: -38.0   # Measure your actual offset!
y_offset: 6.0    # Measure your actual offset!
#z_offset: 0       # Set via PROBE_CALIBRATE
speed: 5

[filament_switch_sensor runout_sensor]
switch_pin: ^PA4
pause_on_runout: True
runout_gcode:
    PAUSE
insert_gcode:
    RESUME

[safe_z_home]
home_xy_position: 155.5, 111.5  # Center of bed (accounting for BLTouch offset)
speed: 100
z_hop: 10
z_hop_speed: 5

[bed_mesh]
speed: 120
horizontal_move_z: 10
mesh_min: 15, 15
mesh_max: 190, 220   # bed_max minus bltouch offsets
probe_count: 5, 5
algorithm: bicubic
fade_start: 1
fade_end: 10

#####################################################################
# Heated Bed
#####################################################################

[heater_bed]
heater_pin: PA2
sensor_type: EPCOS 100K B57560G104F
sensor_pin: PC4
#control: pid
#pid_kp: 54.027
#pid_ki: 0.770
#pid_kd: 948.182
min_temp: 0
max_temp: 130

#####################################################################
# Fan
#####################################################################

[fan]
pin: PA0

[idle_timeout]
timeout: 300        ; "a few minutes" of inactivity (300 = 5 min)
gcode:
    M84
    TURN_OFF_HEATERS
    UPDATE_DELAYED_GCODE ID=POWER_OFF_CHECK DURATION=60

[gcode_macro _POWER_OFF_PRINTER]
gcode:
    {action_call_remote_method("set_device_power", device="printer_psu", state="off")}

[delayed_gcode POWER_OFF_CHECK]
initial_duration: 0
gcode:
    {% if printer.idle_timeout.state == "Idle" %}
        {% if printer.extruder.temperature < 50.0 and printer.heater_bed.temperature < 50.0 %}
            _POWER_OFF_PRINTER
        {% else %}
            UPDATE_DELAYED_GCODE ID=POWER_OFF_CHECK DURATION=60
        {% endif %}
    {% endif %}

#####################################################################
# Display (stock Ender 3 V2 screen)
#####################################################################

#[display]
#lcd_type: dwin_set
#encoder_pins: ^PA3, ^PA4    # May not be needed with Klipper
#click_pin: ^!PA5

# Note: The stock LCD has limited Klipper support.
# Many users disable it. Remove this section if you get errors.

#####################################################################
# Macros
#####################################################################

[gcode_macro START_PRINT]
gcode:
    {% set BED_TEMP = params.BED_TEMP|default(60)|float %}
    {% set EXTRUDER_TEMP = params.EXTRUDER_TEMP|default(200)|float %}

    # Start both heaters in parallel while homing
    M140 S{BED_TEMP}                  ; start bed warming
    M104 S{EXTRUDER_TEMP}             ; start hotend warming

    G28                               ; home all axes
    BED_MESH_PROFILE LOAD=default     ; load saved mesh

    # Wait for full temperature before purge
    M190 S{BED_TEMP}
    M109 S{EXTRUDER_TEMP}

    # Set a known state BEFORE any G1 move
    G90                               ; absolute positioning
    M82                               ; absolute extrusion

    # Purge line on the left side of the bed
    G92 E0                            ; reset extruder
    G1 Z2.0 F3000                     ; lift to avoid scratching
    G1 X10.1 Y20 Z0.3 F5000           ; move to start
    G1 X10.1 Y200 Z0.3 F1500 E15      ; first line
    G1 X10.4 Y200 Z0.3 F5000          ; offset
    G1 X10.4 Y20 Z0.3 F1500 E30       ; second line
    G92 E0                            ; reset extruder
    G1 Z2.0 F3000                     ; lift before printing
    G1 X15 Y20 Z0.3 F5000             ; transition move

[gcode_macro END_PRINT]
gcode:
    # Set relative mode for retract + lift
    M83                               ; relative extrusion
    G91                               ; relative positioning
    G1 E-2 F2700                      ; retract a bit
    G1 E-2 Z0.2 F2400                 ; retract more and lift
    G1 X5 Y5 F3000                    ; wipe
    G1 Z10 F3000                      ; raise more
    G90                               ; absolute positioning

    # Present the print
    G1 X0 Y220 F3000                  ; bed forward

    # Shut everything down
    M106 S0                           ; fan off
    TURN_OFF_HEATERS                  ; hotend + bed off
    M84                               ; disable steppers
    M117 Print Completed

