[gcode_macro FILAMENT_CHANGE]
variable_is_active: False
variable_load_amount: 150
gcode:
    {% set min_temp = params.MIN_TEMP|default(170)|int %}
    {% set retract_dist = params.RETRACT|default(110)|float %}
    {% set load_dist = params.LOAD|default(150)|float %}
    {% set cur_temp = printer.extruder.temperature %}

    {% if cur_temp < min_temp %}
        { action_raise_error("Hotend is %.0fC, need at least %dC before changing filament" % (cur_temp, min_temp)) }
    {% else %}
        SET_GCODE_VARIABLE MACRO=FILAMENT_CHANGE VARIABLE=is_active VALUE=True
        SET_GCODE_VARIABLE MACRO=FILAMENT_CHANGE VARIABLE=load_amount VALUE={load_dist}
        SAVE_GCODE_STATE NAME=FILAMENT_CHANGE_STATE
        M83                          ; relative extrusion
        G1 E-{retract_dist} F1500    ; retract old filament
        M400
        M117 Filament retracted - swap it, then send RESUME
        PAUSE
    {% endif %}

[gcode_macro RESUME]
rename_existing: BASE_RESUME
gcode:
    {% if printer["gcode_macro FILAMENT_CHANGE"].is_active %}
        SET_GCODE_VARIABLE MACRO=FILAMENT_CHANGE VARIABLE=is_active VALUE=False
        M83
        G1 E{printer["gcode_macro FILAMENT_CHANGE"].load_amount} F300   ; load new filament
        M400
        RESTORE_GCODE_STATE NAME=FILAMENT_CHANGE_STATE MOVE=1
    {% endif %}
    BASE_RESUME

[gcode_macro M600]
gcode:
    FILAMENT_CHANGE

[gcode_macro ACTIVATE_POWER_OFF]
variable_msg_only_once: 0
gcode:
   SET_GCODE_VARIABLE MACRO=ACTIVATE_POWER_OFF VARIABLE=msg_only_once VALUE=0
   UPDATE_DELAYED_GCODE ID=POWER_OFF_PRINTER_CHECK_ACT DURATION=60

[gcode_macro DEACTIVATE_POWER_OFF]
gcode:
   UPDATE_DELAYED_GCODE ID=POWER_OFF_PRINTER_CHECK_ACT DURATION=0
   UPDATE_DELAYED_GCODE ID=POWER_OFF_PRINTER_CHECK DURATION=0

[delayed_gcode POWER_OFF_PRINTER_CHECK_ACT]
gcode:
   {% set idle_state = printer.idle_timeout.state | string %}
   {% if (idle_state == "Idle" or idle_state == "Ready") and printer.print_stats.state != "paused" %}
      UPDATE_DELAYED_GCODE ID=POWER_OFF_PRINTER_CHECK DURATION=30
   {% else %}
      UPDATE_DELAYED_GCODE ID=POWER_OFF_PRINTER_CHECK_ACT DURATION=60
   {% endif %}

[gcode_macro _POWER_OFF_PRINTER]
gcode:
  {action_call_remote_method("set_device_power",
                             device="printer",
                             state="off")}

[delayed_gcode POWER_OFF_PRINTER_CHECK]
gcode:
   {% set idle_state = printer.idle_timeout.state | string %}
   {% set e_target = printer.extruder.target | float | round(1) %}
   {% set bed_target = printer.heater_bed.target | float | round(1) %}
   {% set msg_only_once = printer["gcode_macro ACTIVATE_POWER_OFF"].msg_only_once | int %}
   {% if msg_only_once == 0 %}
      M118 Printer shutdown is active: Waiting for the extruder to cool down to 50°C, then the printer will be turned off.
      SET_GCODE_VARIABLE MACRO=ACTIVATE_POWER_OFF VARIABLE=msg_only_once VALUE=1  
   {% endif %}  
   {% if idle_state == "Idle" or idle_state == "Ready" %}
      {% if printer.extruder.temperature < 50.0 and printer.heater_bed.temperature < 50.0 %}
         {% if e_target == 0.0 and bed_target == 0.0 %}
            UPDATE_DELAYED_GCODE ID=POWER_OFF_PRINTER_CHECK DURATION=0
            SET_GCODE_VARIABLE MACRO=ACTIVATE_POWER_OFF VARIABLE=msg_only_once VALUE=0
            _POWER_OFF_PRINTER
         {% endif %}	
      {% elif e_target == 0.0 and bed_target == 0.0 %}
         UPDATE_DELAYED_GCODE ID=POWER_OFF_PRINTER_CHECK DURATION=2
      {% elif e_target > 0.0 or bed_target > 0.0 %}
         UPDATE_DELAYED_GCODE ID=POWER_OFF_PRINTER_CHECK DURATION=0
         M118 The scheduled printer shutdown has been canceled: Temperature interaction by the user.
      {% else %}
         UPDATE_DELAYED_GCODE ID=POWER_OFF_PRINTER_CHECK DURATION=0
      {% endif %}	  
   {% elif idle_state == "Printing" %}
      UPDATE_DELAYED_GCODE ID=POWER_OFF_PRINTER_CHECK DURATION=0
      M118 The scheduled printer shutdown has been canceled: User-side print interaction.	  
   {% endif %}